<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Day 11: hablar</title>
  <style>
    :root {
      --green1:#2d6f6b;
      --green2:#4f8a84;
      --purple1:#9747b3;
      --purple2:#b05ad0;
      --gray1:#b6c0c0;
      --gray2:#9ea9ab;
    }
    body {
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg,#f7fbfb,#eff4f2);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:#2d4b4d;
    }
    .shell {
      width:min(420px, 92vw);
      background:#fff;
      border-radius:28px;
      box-shadow:0 16px 40px rgba(0,0,0,.08);
      padding:42px 24px 30px;
      text-align:center;
      border:1px solid rgba(0,0,0,.05);
    }
    .day {
      font-size:2rem;
      line-height:1.15;
      font-weight:800;
      margin:4px 0 12px;
      color:#31595a;
    }
    .translation {
      font-size:1.15rem;
      color:#8b9496;
      margin:0 0 30px;
    }
    .btn {
      display:block;
      width:100%;
      border:none;
      border-radius:18px;
      padding:18px 20px;
      margin:0 auto 18px;
      color:#fff;
      font-size:1.02rem;
      font-weight:800;
      letter-spacing:.2px;
      box-shadow:0 10px 24px rgba(0,0,0,.11);
      cursor:pointer;
    }
    .btn.listen { background:linear-gradient(135deg,var(--green1),var(--green2)); }
    .btn.ai { background:linear-gradient(135deg,var(--purple1),var(--purple2)); }
    .btn.back { background:linear-gradient(135deg,var(--gray1),var(--gray2)); margin-bottom:0; }
    .btn:active { transform:scale(.99); }
    audio { display:none; }
  </style>
</head>
<body>
  <main class="shell">
    <div class="day">Day 11: hablar</div>
    <div class="translation">to speak</div>
    <audio id="audio" preload="none">
      <source src="../audio/11.mp3" type="audio/mpeg">
    </audio>
    <button class="btn listen" onclick="document.getElementById('audio').play()">▶ LISTEN</button>
    <button class="btn ai" onclick="window.location.href='https://chatgpt.com/g/g-your-coach-id-here'">📸 Check Sentences with AI</button>
    <button class="btn back" onclick="window.location.href='../index.html'">🏠 Back to Hub</button>
  </main>
</body>
</html>
