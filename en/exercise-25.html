<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>English Dictation Ex 25</title>
<style>
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f9f7; margin:0; }
.player { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.1); text-align: center; width: 80%; max-width: 350px; border: 2px solid #e0ece6;}
h2 { color: #2a5a5a; font-size: 24px; margin-bottom: 30px;}
button { width: 100%; padding: 18px; margin-bottom: 15px; font-size: 16px; font-weight: bold; border: none; border-radius: 30px; cursor: pointer; color: white; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.1);}
button:active { transform: scale(0.95); }
.normal { background: linear-gradient(135deg, #2a5a5a, #3a7a7a); }
.slow { background: linear-gradient(135deg, #e67e22, #f39c12); }
</style>
</head>
<body>
<div class="player">
<h2>Exercise 25</h2>
<audio id="audio"></audio>
<button class="normal" onclick="play('normal')">▶ NORMAL SPEED</button>
<button class="slow" onclick="play('slow')">▶ SLOW SPEED</button>
</div>
<script>
function play(speed) {
    var audio = document.getElementById('audio');
    audio.src = speed === 'slow' ? 'audio/ex-25-slow.mp3' : 'audio/ex-25.mp3';
    audio.play();
}
</script>
</body>
</html>
