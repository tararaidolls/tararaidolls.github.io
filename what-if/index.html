        #lang-screen {

        }

        #lang-screen p { color: #666; margin-bottom: 25px; font-size: 14px; }
        .lang-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            width: 100%; max-width: 400px;
        }
        .lang-btn {
            padding: 14px 10px; border: 2px solid #2a5a5a; border-radius: 12px;

            transition: all 0.2s; text-align: center;
        }
        .lang-btn:hover, .lang-btn:active { background: #2a5a5a; color: white; transform: scale(1.03); }
        .lang-flag { font-size: 22px; display: block; margin-bottom: 4px; }

        /* GAME SCREEN */
        #game-screen { display: none; width: 100%; max-width: 500px; padding: 15px; }
        
        header {

        .level-tabs {

        .level-tab {
            padding: 8px 16px; border-radius: 20px; border: 2px solid #2a5a5a;
            background: white; color: #2a5a5a; font-weight: 700; font-size: 13px;
            cursor: pointer; font-family: 'Nunito', sans-serif; transition: all 0.2s;
        }
        .level-tab.active { background: #2a5a5a; color: white; }

        .card-container {
            width: 100%; aspect-ratio: 3/4; perspective: 1000px;
            margin-bottom: 12px; cursor: pointer;
        }
        .card {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d; transition: transform 0.6s;
        }
        .card.flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 30px; text-align: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        .card-front {
            background: linear-gradient(145deg, #ffffff, #f0f7f0);
            border: 3px solid #2a5a5a;
        }
        .card-back {
            background: linear-gradient(145deg, #2a5a5a, #1a4040);
            transform: rotateY(180deg);
        }
        .card-front .question { font-size: 22px; font-weight: 800; color: #2a5a5a; line-height: 1.4; }
        .card-front .hint { font-size: 13px; color: #888; margin-top: 15px; font-style: italic; }
        .card-front .level-badge {
            position: absolute; top: 15px; left: 15px;
            background: #2a5a5a; color: white; padding: 4px 12px;
            border-radius: 10px; font-size: 11px; font-weight: 700;
        }
        .card-front .card-num {
            position: absolute; top: 15px; right: 15px;
            color: #aaa; font-size: 13px; font-weight: 700;
        }
        .card-back p { color: white; font-size: 16px; line-height: 1.6; padding: 20px; }
        .card-back .tap-hint { color: rgba(255,255,255,0.5); font-size: 12px; margin-top: 15px; }

        .controls { display: flex; gap: 10px; width: 100%; justify-content: center; }
        .ctrl-btn {
            padding: 12px 28px; border-radius: 25px; border: none;
            font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700;

        .btn-lang { background: #f0f0f0; color: #666; font-size: 13px; padding: 10px 16px; }

        .progress {
            width: 100%; text-align: center; color: #999;
            font-size: 12px; margin-top: 10px;
        }

            margin-top: 20px; text-align: center; color: #bbb;

        .branding a { color: #2a5a5a; text-decoration: none; }
    </style>
</head>

    <div class="controls">

let currentLang = null;
let currentLevel = 0;
let currentIndex = 0;
let cards = [];

// Check URL param
const urlParams = new URLSearchParams(window.location.search);
const langParam = urlParams.get('lang');

function init() {
    const grid = document.getElementById('lang-grid');
    for (const [code, lang] of Object.entries(LANGS)) {
        const btn = document.createElement('button');
        btn.className = 'lang-btn';
        btn.innerHTML = `<span class="lang-flag">${lang.flag}</span>${lang.name}`;
        btn.onclick = () => startGame(code);
        grid.appendChild(btn);
    }
    if (langParam && LANGS[langParam]) startGame(langParam);
}

function startGame(langCode) {
    currentLang = langCode;
    currentLevel = 0;
    currentIndex = 0;
    document.getElementById('lang-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    document.getElementById('game-title').textContent = LANGS[langCode].title;
    
    buildLevelTabs();
    loadLevel(0);
}

function buildLevelTabs() {
    const tabs = document.getElementById('level-tabs');
    tabs.innerHTML = '';
    const levels = LANGS[currentLang].levels;
    levels.forEach((name, idx) => {
        const tab = document.createElement('button');
        tab.className = 'level-tab' + (idx === currentLevel ? ' active' : '');
        tab.textContent = name;
        tab.onclick = () => loadLevel(idx);
        tabs.appendChild(tab);
    });
}

function loadLevel(lvl) {
    currentLevel = lvl;
    currentIndex = 0;
    const levelKey = ['L1','L2','L3'][lvl];
    cards = [...Q[currentLang][levelKey]];
    buildLevelTabs();
    showCard();
}

function showCard() {
    if (currentIndex >= cards.length) currentIndex = 0;
    const [question, hint] = cards[currentIndex];
    document.getElementById('card-question').textContent = question;
    document.getElementById('card-hint').textContent = hint ? `${LANGS[currentLang].levels[currentLevel] === LANGS[currentLang].levels[0] ? '💡 ' : '🤔 '}${hint}` : '';
    document.getElementById('card-level').textContent = LANGS[currentLang].levels[currentLevel];
    document.getElementById('card-num').textContent = `${currentIndex + 1}/${cards.length}`;
    document.getElementById('card').classList.remove('flipped');
    document.getElementById('progress').textContent = `Card ${currentIndex + 1} of ${cards.length}`;
    
    // Update back text
    const back = LANGS[currentLang].back;
    document.querySelector('.card-back p').innerHTML = back.join('<br>');
    
    // Update next button
    document.querySelector('.btn-next').textContent = LANGS[currentLang].next;
}

function flipCard() {
    document.getElementById('card').classList.toggle('flipped');
}

function nextCard() {
    currentIndex++;
    if (currentIndex >= cards.length) currentIndex = 0;
    showCard();
}

function shuffle() {
    for (let i = cards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [cards[i], cards[j]] = [cards[j], cards[i]];
    }
    currentIndex = 0;
    showCard();
}

function changeLang() {
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('lang-screen').style.display = 'flex';
}

init();
</script>
